<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
    body {
        margin: 0;
        padding: 0;
        font-family: 'Pacifico', cursive;
        background: linear-gradient(120deg, #f6d365, #fda085);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        position: relative;
        color: #fff;
        text-align: center;
    }

    h1 {
        font-size: 4em;
        margin: 0.2em 0;
        animation: bounce 2s infinite;
    }

    p {
        font-size: 1.5em;
        margin: 0.2em 0;
    }

    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-20px); }
        60% { transform: translateY(-10px); }
    }

    .balloon {
        width: 60px;
        height: 90px;
        background-color: #ff6b6b;
        border-radius: 50% 50% 50% 50%;
        position: absolute;
        bottom: -100px;
        animation: float 6s infinite ease-in-out;
    }

    .balloon::after {
        content: '';
        width: 2px;
        height: 40px;
        background: #555;
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
    }

    @keyframes float {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-800px) rotate(20deg); }
        100% { transform: translateY(0) rotate(-20deg); }
    }

    /* Multiple balloons with different colors & delays */
    .balloon:nth-child(1) { left: 10%; background: #ff6b6b; animation-delay: 0s; }
    .balloon:nth-child(2) { left: 30%; background: #feca57; animation-delay: 1s; }
    .balloon:nth-child(3) { left: 50%; background: #48dbfb; animation-delay: 2s; }
    .balloon:nth-child(4) { left: 70%; background: #1dd1a1; animation-delay: 3s; }
    .balloon:nth-child(5) { left: 90%; background: #ff9ff3; animation-delay: 4s; }

    /* Confetti effect */
    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #fff;
        top: -10px;
        opacity: 0.7;
        animation: confettiFall 5s linear infinite;
    }

    @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(100vh) rotate(360deg); }
    }
</style>
</head>
<body>
    <div>
        <h1>🎉 Happy Birthday! 🎉</h1>
        <p>Wishing you a day full of love, joy, and surprises!</p>
        <p>bnVudWEgZ2FyaSB1bWVrdWE=
</p>
    </div>

    <!-- Balloons -->
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>

    <!-- Confetti -->
    <script>
        // Create multiple confetti pieces
        for(let i=0;i<100;i++){
            let confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 60%)`;
            confetti.style.animationDuration = 2 + Math.random()*3 + 's';
            confetti.style.width = 5 + Math.random()*10 + 'px';
            confetti.style.height = confetti.style.width;
            document.body.appendChild(confetti);
        }
    </script>
</body>
</html>
