<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<title>Login UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
    background-color: #202124;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;   /* 🔥 change this */
    color: white;
    position: relative;  /* 🔥 add this */
}

    .container {
        background: #171717;
        width: 900px;
        padding: 40px;
        border-radius: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* LEFT SIDE */
    .left {
        max-width: 40%;
    }

.google-logo {
    width: 75px;
    margin-bottom: 20px;
}
    .welcome {
        font-size: 40px;
        margin-bottom: 20px;
    }

    .email-box {
        border: 1px solid #5f6368;
        padding: 10px 15px;
        border-radius: 25px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
    }

    /* RIGHT SIDE */
    .right {
        width: 50%;
    }

    .input-group {
        margin-bottom: 15px;
    }

    input[type="password"] {
        width: 100%;
        padding: 12px;
        border-radius: 5px;
        border: 1px solid #5f6368;
        background: transparent;
        color: white;
        font-size: 16px;
    }

    input:focus {
        outline: none;
        border-color: #8ab4f8;
    }

    .show-pass {
        margin-top: 10px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #bdc1c6;
    }

    .actions {
        margin-top: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .forgot {
        color: #8ab4f8;
        text-decoration: none;
        font-size: 14px;
    }

    .next-btn {
        background: #8ab4f8;
        border: none;
        padding: 10px 25px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
    }

    .footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    flex-direction: column;
    gap: 10px;
    padding: 10px 20px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: white;
    background: #202124;
}




    /* 2. Add these styles for the account pill */
    .account-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #dadce0;
        border-radius: 16px;
        padding: 3px 10px 3px 4px; /* More padding on the left for the icon */
        margin-bottom: 24px;
        font-size: 14px;
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .account-pill:hover {
        background-color: #f8f9fa;
    }

    .user-icon {
        font-size: 20px !important;
        margin-right: 6px;
        color: white;
    }

    .dropdown-icon {
        font-size: 18px !important;
        margin-left: 4px;
        color: white;
    }
/* ================= RESPONSIVE DESIGN ================= */

/* Tablet */
@media (max-width: 900px) {
    .container {
        width: 90%;
        padding: 30px;
        flex-direction: column;
        align-items: flex-start;
        gap: 30px;
    }

    .left, .right {
        width: 100%;
        max-width: 100%;
    }

    .welcome {
        font-size: 32px;
    }
}

/* Mobile */
@media (max-width: 600px) {

    body {
        align-items: flex-start; /* 🔥 move content up like Google */
        padding-top: 40px;
    }

    .container {
        width: 100%;
        height: auto;
        border-radius: 0;
        padding: 20px;
        gap: 25px;
    }

    .google-logo {
        width: 60px;
    }

    .welcome {
        font-size: 26px;
    }

    .account-pill {
        font-size: 13px;
        padding: 4px 8px;
    }

    input[type="password"] {
        font-size: 16px;
        padding: 14px;
    }

    .actions {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .next-btn {
        width: 100%; /* 🔥 full width button */
        text-align: center;
    }

    .footer {
        flex-direction: column;
        gap: 10px;
        padding: 10px 20px;
        font-size: 12px;
        align-items: flex-start;
    }
}


</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
       <img class="google-logo" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google Logo">
        <div class="welcome">Welcome</div>

        <div style="text-align: center;">
    <div class="account-pill">
        <span class="material-symbols-outlined user-icon">account_circle</span>
        <span>chariserasto1@gmail.com</span>
        <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
    </div>
</div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="input-group">
            <input type="password" placeholder="Enter your password">
        </div>

        <label class="show-pass">
            <input type="checkbox" onclick="togglePassword()"> Show password
        </label>

        <div class="actions">
            <a href="#" class="forgot">Forgot password?</a>
            <button class="next-btn">Next</button>
        </div>
    </div>

</div>

<div class="footer">
    <div>English (United States)</div>
    <div>Help &nbsp;&nbsp; Privacy &nbsp;&nbsp; Terms</div>
</div>

</body>
<script>
function togglePassword() {
    const passwordInput = document.querySelector("input[type='password'], input[type='text']");
    
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}
</script>
</html>
